on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Run pre-commit checks
        uses: pre-commit/action@v3.0.1

  test:
    runs-on: ubuntu-latest
    needs: [pre-commit]
    env:
      UV_LOCKED: "true"
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.7"
          enable-cache: "true"
      - name: Install Python dependencies
        run: uv sync
      - name: Python type checking
        run: uv run mypy .
      - name: Python tests
        run: COLUMNS=120 uv run pytest -vvv --color=yes

  bundle:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm -C frontend ci
      - name: Build frontend
        env:
          FRONTEND_PATH: ticket_queue/frontend
        run: |
          npm -C frontend run build -- --emptyOutDir --outDir "$PWD/$FRONTEND_PATH"
          tree -a "$FRONTEND_PATH"
      - name: Disable custom build hook
        run: |
          rm frontend_build_hook.py
          rm -rf frontend/
          perl -0777 -i -pe 's/(?ms)\[tool\.hatch\.build\.hooks\.custom\].*?^\n//' pyproject.toml
          ! git diff --exit-code -- pyproject.toml
      - name: Generate frontend package file
        run: |
          >ticket_queue/_packaged_frontend.py cat << EOF
          import os.path

          PACKAGE_DIR = os.path.join(
              os.path.dirname(__file__),
              "frontend"
          )
          EOF
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Commit changes and push to bundled branch
        run: |
          worktree="$(mktemp -d)/bundled"

          if git ls-remote --exit-code --heads origin bundled >/dev/null; then
            git worktree add --track -b bundled "$worktree" origin/bundled
          else
            git worktree add -b bundled "$worktree"
          fi

          rsync \
            --info=progress2 \
            -avv \
            --delete --delete-excluded \
            --filter 'P /.git' --exclude=/.git --filter=':- .gitignore' \
            . "$worktree/"

          git -C "$worktree" add --all
          if git -C "$worktree" commit -m "Bundle for ${{ github.sha }}"; then
            git -C "$worktree" push -u origin bundled
          else
            echo "No changes to commit."
          fi

  publish-container:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build and push container
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
