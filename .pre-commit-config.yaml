repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.3
    hooks:
      - id: ruff
      - id: ruff-format
  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        language: node
        entry: prettier
        args: ['--write', '--ignore-unknown']
        files: 'frontend/.*'
        additional_dependencies: ['prettier@3.3.3']
